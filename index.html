<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KetoBuddy v5.1</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#00e676"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="KetoBuddy"/>
<meta name="description" content="Smart keto companion — personalised macros, daily tracking, and real progress."/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#00e676;--green2:#00c853;--dark:#080d14;--card:#0f1923;--card2:#162032;
  --border:rgba(255,255,255,0.07);--text:#f0f4f8;--muted:#5a7a9a;
  --red:#ff4d6d;--yellow:#ffd166;--blue:#4cc9f0;--orange:#ff9a3c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,230,118,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* Header, container, bottom-nav, sections, cards, buttons, etc. — kept mostly the same for familiarity */
.header{padding:16px 20px 12px;background:linear-gradient(180deg,rgba(0,230,118,0.07) 0%,transparent 100%);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 0 20px rgba(0,230,118,0.4);}
.logo h1{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.5px;}
.streak{background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.25);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--yellow);font-weight:700;}
.container{max-width:500px;margin:0 auto;padding:0 16px 110px;position:relative;z-index:1;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,13,20,0.98);border-top:1px solid var(--border);display:flex;z-index:200;backdrop-filter:blur(20px);}
.nav-btn{min-width:56px;flex:1;padding:10px 2px 9px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;}
.nav-btn.active{color:var(--green);}
.section{display:none;padding-top:16px;}
.section.active{display:block;}
.card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid var(--border);}
.btn{width:100%;padding:13px;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-g{background:linear-gradient(135deg,var(--green),var(--green2));color:#000;}
.inp{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:13px;color:var(--text);outline:none;}
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:9px 18px;border-radius:20px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:all 0.3s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RESULTS SCREEN */
.ob-result-card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:16px;border:1.5px solid var(--border);}
.ob-macro-card{display:flex;gap:12px;align-items:center;background:rgba(0,0,0,0.25);border-radius:14px;padding:14px;margin-bottom:10px;}
.ob-macro-emoji{font-size:28px;}
.ob-macro-info{flex:1;}
.ob-macro-name{font-weight:700;font-size:15px;}
.ob-macro-grams{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.ob-macro-pct{font-size:12px;color:var(--muted);}
.pie-chart{width:110px;height:110px;border-radius:50%;position:relative;background:conic-gradient(#ff4d6d 0% 8%, #4cc9f0 8% 35%, #ff9a3c 35% 100%);display:flex;align-items:center;justify-content:center;}
.pie-chart::after{content:'';width:60px;height:60px;background:var(--card);border-radius:50%;}

/* DASHBOARD */
.dashboard-header{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;}
.progress-bar-bg{background:rgba(255,255,255,0.08);height:8px;border-radius:9999px;overflow:hidden;margin:6px 0;}
.progress-bar{height:100%;transition:width 0.4s ease;}
.macro-remaining{font-size:13px;color:var(--muted);margin-top:4px;}
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
</style>
</head>
<body>
<div id="toast" class="toast">✅ Done!</div>

<!-- ONBOARDING (kept mostly as-is, with improved results screen) -->
<div id="onboarding" style="position:fixed;inset:0;background:#080d14;z-index:9999;display:flex;flex-direction:column;overflow-y:auto;">
  <div style="max-width:500px;margin:0 auto;padding:24px 20px 40px;width:100%;">
    <!-- Progress dots + logo -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px;">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,#00e676,#00bcd4);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;">🥑</div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">KetoBuddy</div>
        <div style="font-size:12px;color:var(--muted)">Let's build your plan</div>
      </div>
    </div>
    <div id="obProgress" style="display:flex;gap:5px;margin-bottom:28px;">
      <!-- dots filled by JS -->
    </div>

    <!-- SCREEN 1-5 same as before (name, sex, measurements, activity, goal, keto level) -->
    <!-- ... (your original onboarding screens 1-5) ... -->

    <!-- RESULTS SCREEN - UPGRADED -->
    <div id="obs-6" class="ob-screen">
      <button onclick="obBack(6)" style="background:none;border:none;color:var(--muted);margin-bottom:12px">← Back</button>
      <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px">Your personalised plan <span id="ob-name-display"></span>! 🎉</div>

      <!-- Calories -->
      <div class="ob-result-card" style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--muted);font-weight:700">DAILY ENERGY TARGET</div>
        <div id="ob-cal-display" style="font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--orange);line-height:1">—</div>
        <div id="ob-cal-sub" style="color:var(--muted)"></div>
      </div>

      <!-- Macro Cards -->
      <div id="ob-macro-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px"></div>

      <!-- Pie Chart -->
      <div style="text-align:center;margin:20px 0">
        <div id="pie-chart" class="pie-chart" style="margin:0 auto">
          <div style="font-size:11px;color:var(--muted);text-align:center">Macro Split</div>
        </div>
      </div>

      <!-- Explanation -->
      <div class="ob-result-card" style="margin-bottom:20px">
        <div style="font-size:12px;color:var(--muted);font-weight:700">📊 WHAT THIS MEANS FOR KETO</div>
        <div id="ob-explain" style="font-size:13px;line-height:1.6;color:#c0d0e0"></div>
      </div>

      <button onclick="obFinish()" style="width:100%;padding:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;border:none;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer">
        Start My Keto Journey 🚀
      </button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
  <div class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🥑</div>
        <div><h1>KetoBuddy</h1><p>Daily Keto Companion</p></div>
      </div>
      <div id="streakBadge" class="streak">🔥 Day 1</div>
    </div>
  </div>

  <div class="container">

    <!-- TRACKER SECTION (new daily core) -->
    <div id="sec-tracker" class="section active">
      <div style="margin-bottom:20px">
        <div class="dashboard-header" id="day-header">Day 1 on Keto 🥑</div>
        <div style="font-size:13px;color:var(--muted)" id="date-today"></div>
      </div>

      <!-- Calories -->
      <div style="background:var(--card);border-radius:18px;padding:18px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between">
          <div>
            <div style="font-size:12px;color:var(--muted)">Calories Today</div>
            <div id="calories-eaten" style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--orange)">0</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;color:var(--muted)">Remaining</div>
            <div id="calories-remaining" style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--green)">—</div>
          </div>
        </div>
        <div class="progress-bar-bg"><div id="cal-progress" class="progress-bar" style="background:linear-gradient(90deg,var(--green),#69f0ae);width:0%"></div></div>
      </div>

      <!-- Macro Cards -->
      <div id="macro-cards" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px"></div>

      <!-- Progress Bars -->
      <div id="macro-bars" style="margin-bottom:24px"></div>

      <!-- Log Food -->
      <button onclick="showLogModal()" style="width:100%;padding:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;border:none;border-radius:14px;font-size:16px;font-weight:800;margin-bottom:12px">➕ Log Food</button>

      <!-- Today's Log -->
      <div id="today-log" style="background:var(--card);border-radius:18px;padding:16px"></div>
    </div>

    <!-- Keep all your other sections (scanner, chef, journal, etc.) below -->
    <!-- ... your original sections ... -->

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchSection('tracker',this)"><span>📊</span>Track</button>
    <button class="nav-btn" onclick="switchSection('scanner',this)"><span>🔍</span>Scan</button>
    <button class="nav-btn" onclick="switchSection('snack',this)"><span>🤖</span>Chef</button>
    <button class="nav-btn" onclick="switchSection('journal',this)"><span>📓</span>Journal</button>
  </div>
</div>

<script>
// ====== REFINED MACRO CALCULATION ======
function calculateKetoPlan(userData) {
  const { sex, age, heightCm, weightKg, activityLevel, goal, ketoExperience } = userData;

  // 1. BMR - Mifflin-St Jeor
  let bmr = 10 * weightKg + 6.25 * heightCm - 5 * age;
  bmr += sex === 'male' ? 5 : -161;

  // 2. TDEE
  const multipliers = {
    sedentary: 1.2,
    light: 1.375,
    moderate: 1.55,
    active: 1.725,
    athlete: 1.9
  };
  let tdee = Math.round(bmr * multipliers[activityLevel]);

  // 3. Calorie Target
  let calories = tdee;
  if (goal === 'lose_fast') calories = Math.max(Math.round(tdee * 0.75), sex === 'female' ? 1200 : 1500);
  else if (goal === 'lose_slow') calories = Math.max(Math.round(tdee * 0.85), sex === 'female' ? 1200 : 1500);
  else if (goal === 'muscle') calories = Math.round(tdee * 1.10);
  else if (goal === 'muscle_fast') calories = Math.round(tdee * 1.20);

  // 4. Net Carbs
  let netCarbs = ketoExperience === 'new' ? 30 : ketoExperience === 'some' ? 25 : 20;
  if (goal === 'muscle' || goal === 'muscle_fast') netCarbs += 5;

  // 5. Protein (g/kg total weight)
  let gPerKg = (goal === 'lose_fast' || goal === 'lose_slow') ? 1.7 : 2.0;
  if (ketoExperience === 'new') gPerKg -= 0.2;
  const protein = Math.round(weightKg * gPerKg);

  // 6. Fat (remainder)
  const carbCal = netCarbs * 4;
  const proteinCal = protein * 4;
  let fatCal = calories - carbCal - proteinCal;
  const fat = Math.max(Math.round(fatCal / 9), 60);

  // Percentages
  const carbPct = Math.round((carbCal / calories) * 100);
  const proteinPct = Math.round((proteinCal / calories) * 100);
  const fatPct = 100 - carbPct - proteinPct;

  return {
    calories: Math.round(calories),
    netCarbs,
    protein,
    fat,
    percentages: { carbs: carbPct, protein: proteinPct, fat: fatPct }
  };
}

// Store plan after onboarding
let currentPlan = null;
let userProfile = null;
let foodLog = [];
let streak = 1;

function obFinish() {
  // Calculate plan
  currentPlan = calculateKetoPlan(obData);
  userProfile = { ...obData };

  // Save to localStorage
  localStorage.setItem('kb_plan', JSON.stringify(currentPlan));
  localStorage.setItem('kb_profile', JSON.stringify(userProfile));
  localStorage.setItem('kb_startDate', new Date().toISOString().split('T')[0]);

  // Hide onboarding, show main app
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('mainApp').style.display = 'block';

  // Render dashboard
  renderDashboard();
  showToast('🎉 Welcome! Your keto plan is ready.');
}

function renderDashboard() {
  if (!currentPlan) return;

  document.getElementById('day-header').textContent = `Day ${streak} on Keto 🥑`;
  document.getElementById('date-today').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

  // Calories
  const eaten = foodLog.reduce((sum, f) => sum + (f.calories || 0), 0);
  const remaining = currentPlan.calories - eaten;
  document.getElementById('calories-eaten').textContent = eaten;
  document.getElementById('calories-remaining').textContent = remaining > 0 ? remaining : '0';
  document.getElementById('calories-remaining').style.color = remaining > 0 ? 'var(--green)' : 'var(--red)';

  // Macro cards & bars (implement similar to your original macro rendering but using currentPlan)
  // ... (add your macro rendering logic here using currentPlan.netCarbs, currentPlan.protein, currentPlan.fat)

  renderTodayLog();
}

function showLogModal() {
  // Simple manual entry modal - you can expand this
  const name = prompt("Food name?");
  if (!name) return;
  const cal = parseInt(prompt("Calories?")) || 0;
  const c = parseFloat(prompt("Net Carbs (g)?")) || 0;
  const f = parseFloat(prompt("Fat (g)?")) || 0;
  const p = parseFloat(prompt("Protein (g)?")) || 0;

  foodLog.unshift({ name, calories: cal, carbs: c, fat: f, protein: p });
  renderDashboard();
  showToast('✅ Logged!');
}

function renderTodayLog() {
  const container = document.getElementById('today-log');
  if (!foodLog.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px">No food logged yet today</div>';
    return;
  }
  let html = '';
  foodLog.forEach((item, i) => {
    html += `<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
      <div>${item.name}</div>
      <div style="color:var(--muted)">${item.calories} kcal</div>
    </div>`;
  });
  container.innerHTML = html;
}

// Simple section switcher
function switchSection(section, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + section).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Init
window.onload = () => {
  // Load saved plan if exists
  const savedPlan = localStorage.getItem('kb_plan');
  if (savedPlan) {
    currentPlan = JSON.parse(savedPlan);
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('mainApp').style.display = 'block';
    renderDashboard();
  }
  // Your other init code...
};
</script>
</body>
</html>
