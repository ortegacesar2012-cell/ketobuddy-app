<style>
/* Your original beautiful styles are kept here — I didn't remove anything important */
:root{--green:#00e676;--green2:#00c853;--dark:#080d14;--card:#0f1923;--card2:#162032;--border:rgba(255,255,255,0.07);--text:#f0f4f8;--muted:#5a7a9a;--red:#ff4d6d;--yellow:#ffd166;--blue:#4cc9f0;--orange:#ff9a3c;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}
.header{padding:16px 20px 12px;background:linear-gradient(180deg,rgba(0,230,118,0.07) 0%,transparent 100%);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.container{max-width:500px;margin:0 auto;padding:0 16px 110px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,13,20,0.98);border-top:1px solid var(--border);display:flex;z-index:200;}
.nav-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;}
.nav-btn.active{color:var(--green);}
.card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid var(--border);}
.btn{width:100%;padding:14px;border:none;border-radius:13px;font-size:16px;font-weight:800;cursor:pointer;}
.btn-g{background:linear-gradient(135deg,var(--green),var(--green2));color:#000;}
.ob-result-card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:16px;border:1.5px solid var(--border);}
.pie-chart{width:140px;height:140px;border-radius:50%;margin:0 auto;background:conic-gradient(#ff4d6d 0% 8%, #4cc9f0 8% 35%, #ff9a3c 35% 100%);display:flex;align-items:center;justify-content:center;}
</style>
</head>

<!-- ONBOARDING -->

          <div style="width:70px;height:70px;background:var(--card);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:11px;color:var(--muted)">Macros</div>

      </div>

</html>
