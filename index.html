<style>
:root{
  --green:#00e676;--green2:#00c853;--dark:#080d14;--card:#0f1923;--card2:#162032;
  --border:rgba(255,255,255,0.07);--text:#f0f4f8;--muted:#5a7a9a;
  --red:#ff4d6d;--yellow:#ffd166;--blue:#4cc9f0;--orange:#ff9a3c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,230,118,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* Your original styles (kept intact) */
.header{padding:16px 20px 12px;background:linear-gradient(180deg,rgba(0,230,118,0.07) 0%,transparent 100%);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 0 20px rgba(0,230,118,0.4);}
.logo h1{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.5px;}
.streak{background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.25);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--yellow);font-weight:700;}
.container{max-width:500px;margin:0 auto;padding:0 16px 110px;position:relative;z-index:1;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,13,20,0.98);border-top:1px solid var(--border);display:flex;z-index:200;backdrop-filter:blur(20px);}
.nav-btn{min-width:56px;flex:1;padding:10px 2px 9px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;}
.nav-btn.active{color:var(--green);}
.section{display:none;padding-top:16px;}
.section.active{display:block;}
.card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px;border:1px solid var(--border);}
.btn{width:100%;padding:13px;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-g{background:linear-gradient(135deg,var(--green),var(--green2));color:#000;}
.inp{width:100%;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:13px;color:var(--text);outline:none;}
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:9px 18px;border-radius:20px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:all 0.3s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Upgraded Results & Dashboard styles */
.ob-result-card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:16px;border:1.5px solid var(--border);}
.ob-macro-card{display:flex;gap:12px;align-items:center;background:rgba(0,0,0,0.25);border-radius:14px;padding:14px;margin-bottom:10px;}
.ob-macro-emoji{font-size:28px;}
.ob-macro-info{flex:1;}
.ob-macro-name{font-weight:700;font-size:15px;}
.ob-macro-grams{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.ob-macro-pct{font-size:12px;color:var(--muted);}
.pie-chart{width:140px;height:140px;border-radius:50%;margin:0 auto;position:relative;background:conic-gradient(#ff4d6d 0% 8%, #4cc9f0 8% 35%, #ff9a3c 35% 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,230,118,0.2);}
.pie-chart::after{content:'';width:70px;height:70px;background:var(--card);border-radius:50%;}

/* Dashboard */
.dashboard-header{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;}
.progress-bar-bg{background:rgba(255,255,255,0.08);height:8px;border-radius:9999px;overflow:hidden;margin:6px 0;}
.progress-bar{height:100%;transition:width 0.4s ease;}
</style>
</head>

<script>
// ====== YOUR ORIGINAL CODE + NEW MACRO FUNCTION ======

// Paste all your original JavaScript here (the big script block from your file)

// Then add the refined macro function below:

function calculateKetoPlan(userData) {
  const { sex, age, heightCm, weightKg, activityLevel, goal, ketoExperience } = userData;

  let bmr = 10 * weightKg + 6.25 * heightCm - 5 * age;
  bmr += sex === 'male' ? 5 : -161;

  const multipliers = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, athlete: 1.9 };
  let tdee = Math.round(bmr * multipliers[activityLevel]);

  let calories = tdee;
  if (goal === 'lose_fast') calories = Math.max(Math.round(tdee * 0.75), sex === 'female' ? 1200 : 1500);
  else if (goal === 'lose_slow') calories = Math.max(Math.round(tdee * 0.85), sex === 'female' ? 1200 : 1500);
  else if (goal === 'muscle') calories = Math.round(tdee * 1.10);
  else if (goal === 'muscle_fast') calories = Math.round(tdee * 1.20);

  let netCarbs = ketoExperience === 'new' ? 30 : ketoExperience === 'some' ? 25 : 20;
  if (goal === 'muscle' || goal === 'muscle_fast') netCarbs += 5;

  let gPerKg = (goal === 'lose_fast' || goal === 'lose_slow') ? 1.7 : 2.0;
  if (ketoExperience === 'new') gPerKg -= 0.2;
  const protein = Math.round(weightKg * gPerKg);

  const carbCal = netCarbs * 4;
  const proteinCal = protein * 4;
  let fatCal = calories - carbCal - proteinCal;
  const fat = Math.max(Math.round(fatCal / 9), 60);

  const carbPct = Math.round((carbCal / calories) * 100);
  const proteinPct = Math.round((proteinCal / calories) * 100);
  const fatPct = 100 - carbPct - proteinPct;

  return {
    calories: Math.round(calories),
    netCarbs,
    protein,
    fat,
    percentages: { carbs: carbPct, protein: proteinPct, fat: fatPct }
  };
}

    </div>
    <div style="background:rgba(0,0,0,0.25);border-radius:14px;padding:14px;text-align:center">
      <div style="font-size:28px">💪</div>
      <div style="font-weight:700">Protein</div>
      <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--blue)">${plan.protein}g</div>
      <div style="font-size:11px">${plan.percentages.protein}%</div>
    </div>
    <div style="background:rgba(0,0,0,0.25);border-radius:14px;padding:14px;text-align:center">
      <div style="font-size:28px">🔥</div>
      <div style="font-weight:700">Fat</div>
      <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--yellow)">${plan.fat}g</div>
      <div style="font-size:11px">${plan.percentages.fat}%</div>
    </div>`;
  document.getElementById('ob-macro-grid').innerHTML = macroHTML;

  document.getElementById('ob-explain').innerHTML = `

    Protein at <strong>${plan.protein}g</strong> preserves muscle.<br>
    Fat fills the rest for sustained energy.
  `;
}

  document.getElementById('mainApp').style.display = 'block';

}

  const remaining = currentPlan.calories - eaten;

  document.getElementById('calories-eaten').textContent = eaten;
  document.getElementById('calories-remaining').textContent = remaining > 0 ? remaining : '0';
  document.getElementById
